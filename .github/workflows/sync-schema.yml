name: Sync Production Schema

on:
  push:
    branches: [develop]

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:push:prod
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
