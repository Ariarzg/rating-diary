name: Sync Preview Schema

on:
  push:
    branches: [develop]

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:push:preview
        env:
          PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
